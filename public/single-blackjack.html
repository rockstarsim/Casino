<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackjack (Single Player) — Barona</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/theme.js"></script>
</head>
<body class="game-page">
  <header class="site-header">
    <div class="header-left">
      <a href="/" class="logo logo-compact"><img src="img/barona-logo.png" alt="Barona" class="logo-img"></a>
      <a href="/" class="back-link">← Lobby</a>
      <h1>Blackjack <span class="mode-badge">Single Player</span></h1>
    </div>
    <div class="header-right">
      <div class="chip-display"><span class="chip-label">Balance</span><span class="chip-amount" id="balance">$10,000</span></div>
      <button type="button" class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>
  <div class="game-panel">
    <div class="table-felt">
      <div class="dealer-area">
        <div id="dealer-header"></div>
        <div id="dealer-cards" class="card-row"></div>
      </div>
      <p id="message" class="game-message">Place your bet.</p>
      <div id="players-area" class="players-grid"></div>
    </div>
    <div class="controls-panel">
      <div class="bet-controls">
        <label>Bet: $<input type="number" id="bet-amount" value="100" min="10" step="10"></label>
        <button id="bet-btn" class="btn btn-gold">Place Bet</button>
      </div>
      <div class="action-controls">
        <button id="deal-btn" class="btn btn-gold" disabled>Deal Cards</button>
        <button id="hit-btn" class="btn" disabled>Hit</button>
        <button id="stand-btn" class="btn" disabled>Stand</button>
        <button id="double-btn" class="btn" disabled>Double</button>
        <button id="new-round-btn" class="btn btn-outline" disabled>New Round</button>
      </div>
    </div>
    <p class="mode-links"><a href="blackjack.html">Play Multiplayer →</a></p>
  </div>
  <script src="js/shared.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/deck.js"></script>
  <script src="js/avatars.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/single-shared.js"></script>
  <script src="js/single-blackjack.js"></script>
</body>
</html>
