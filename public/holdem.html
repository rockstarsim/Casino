<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Hold'em — Casino Royale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/theme.js"></script>
</head>
<body class="game-page">
  <header class="site-header">
    <div class="header-left">
      <a href="/" class="back-link">← Lobby</a>
      <h1>Texas Hold'em</h1>
    </div>
    <div class="header-right">
      <div class="room-code" id="room-code"></div>
      <button type="button" class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <div id="lobby-panel" class="lobby-panel">
    <h2>Join a Table</h2>
    <input type="text" id="player-name" placeholder="Your name" maxlength="16">
    <div class="lobby-actions">
      <button id="create-room-btn" class="btn btn-gold">Create Room</button>
      <div class="join-row">
        <input type="text" id="join-code" placeholder="Room code" maxlength="6">
        <button id="join-room-btn" class="btn btn-outline">Join</button>
      </div>
    </div>
    <p id="lobby-error" class="error-text"></p>
    <p class="mode-links"><a href="single-holdem.html">← Play Single Player vs AI</a></p>
  </div>

  <div id="game-panel" class="game-panel hidden">
    <div class="table-felt holdem-table">
      <div class="pot-display">Pot: <span id="pot">$0</span> · <span id="round-info">Waiting</span></div>
      <div id="community-cards" class="card-row community-row"></div>
      <p id="message" class="game-message">Waiting for players...</p>
      <div id="players-area" class="holdem-seats"></div>
    </div>
    <div class="controls-panel kid-controls">
      <section class="control-step">
        <h4 class="control-step-title">Start &amp; play</h4>
        <div class="action-controls action-grid holdem-actions">
          <button id="start-btn" type="button" class="btn-kid btn-kid-primary">
            <span class="btn-kid-icon">🎮</span>
            <span class="btn-kid-text">Start Game!</span>
            <span class="btn-kid-hint">Deal new cards</span>
          </button>
          <button id="fold-btn" type="button" class="btn-kid btn-kid-danger" disabled>
            <span class="btn-kid-icon">🏳️</span>
            <span class="btn-kid-text">Give Up</span>
            <span class="btn-kid-hint">Throw away cards</span>
          </button>
          <button id="check-btn" type="button" class="btn-kid" disabled>
            <span class="btn-kid-icon">⏭️</span>
            <span class="btn-kid-text">Skip</span>
            <span class="btn-kid-hint">Don't bet now</span>
          </button>
          <button id="call-btn" type="button" class="btn-kid btn-kid-success" disabled>
            <span class="btn-kid-icon">🤝</span>
            <span class="btn-kid-text">Match Bet</span>
            <span class="btn-kid-hint">Pay same amount</span>
          </button>
          <button id="raise-btn" type="button" class="btn-kid btn-kid-primary" disabled>
            <span class="btn-kid-icon">📈</span>
            <span class="btn-kid-text">Bet More!</span>
            <span class="btn-kid-hint">Raise the bet</span>
          </button>
          <button id="allin-btn" type="button" class="btn-kid btn-kid-danger" disabled>
            <span class="btn-kid-icon">💥</span>
            <span class="btn-kid-text">All My Money!</span>
            <span class="btn-kid-hint">Bet everything</span>
          </button>
        </div>
      </section>
      <section class="control-step raise-step">
        <h4 class="control-step-title">Bet more amount</h4>
        <div class="bet-amount-row">
          <span class="bet-dollar">$</span>
          <input type="number" id="raise-amount" value="100" min="50" step="25" disabled aria-label="Raise amount">
        </div>
      </section>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/avatars.js"></script>
  <script src="js/multiplayer.js"></script>
  <script src="js/controls-ui.js"></script>
  <script src="js/holdem-client.js"></script>
</body>
</html>
