<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baccarat — Casino Royale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/theme.js"></script>
</head>
<body class="game-page">
  <header class="site-header">
    <div class="header-left">
      <a href="/" class="back-link">← Lobby</a>
      <h1>Baccarat</h1>
    </div>
    <div class="header-right">
      <div class="room-code" id="room-code"></div>
      <button type="button" class="theme-toggle" aria-label="Toggle theme"></button>
    </div>
  </header>

  <div id="lobby-panel" class="lobby-panel">
    <h2>Join a Table</h2>
    <input type="text" id="player-name" placeholder="Your name" maxlength="16">
    <div class="lobby-actions">
      <button id="create-room-btn" class="btn btn-gold">Create Room</button>
      <div class="join-row">
        <input type="text" id="join-code" placeholder="Room code" maxlength="6">
        <button id="join-room-btn" class="btn btn-outline">Join</button>
      </div>
    </div>
    <p id="lobby-error" class="error-text"></p>
    <p class="mode-links"><a href="single-baccarat.html">← Play Single Player vs AI</a></p>
  </div>

  <div id="game-panel" class="game-panel hidden">
    <div class="table-felt">
      <div class="bac-hands">
        <div class="bac-side">
          <h3>Player <span id="player-total" class="score-badge">0</span></h3>
          <div id="bac-player-cards" class="card-row"></div>
        </div>
        <div class="bac-side">
          <h3>Banker <span id="banker-total" class="score-badge">0</span></h3>
          <div id="bac-banker-cards" class="card-row"></div>
        </div>
      </div>
      <p id="message" class="game-message">Place your bets.</p>
      <div id="players-area" class="players-list"></div>
    </div>
    <div class="controls-panel kid-controls">
      <section class="control-step">
        <h4 class="control-step-title">Step 1 — Who will win?</h4>
        <div class="bet-controls">
          <span class="bet-label">How much money?</span>
          <div class="bet-amount-row">
            <span class="bet-dollar">$</span>
            <input type="number" id="bet-amount" value="100" min="10" step="10" aria-label="Bet amount">
          </div>
          <div class="chip-picks">
            <button type="button" class="chip-pick" data-amount="25">$25</button>
            <button type="button" class="chip-pick" data-amount="50">$50</button>
            <button type="button" class="chip-pick" data-amount="100">$100</button>
            <button type="button" class="chip-pick" data-amount="500">$500</button>
          </div>
          <div class="action-controls action-grid">
            <button id="bet-player-btn" type="button" class="btn-kid btn-kid-baccarat-player">
              <span class="btn-kid-icon">🔵</span>
              <span class="btn-kid-text">Blue Team</span>
              <span class="btn-kid-hint">Bet on Player</span>
            </button>
            <button id="bet-banker-btn" type="button" class="btn-kid btn-kid-baccarat-banker">
              <span class="btn-kid-icon">🔴</span>
              <span class="btn-kid-text">Red Team</span>
              <span class="btn-kid-hint">Bet on Banker</span>
            </button>
            <button id="bet-tie-btn" type="button" class="btn-kid btn-kid-baccarat-tie">
              <span class="btn-kid-icon">🤝</span>
              <span class="btn-kid-text">It's a Tie!</span>
              <span class="btn-kid-hint">Both same score</span>
            </button>
          </div>
        </div>
      </section>
      <section class="control-step">
        <h4 class="control-step-title">Step 2 — Show the cards</h4>
        <div class="action-controls action-grid">
          <button id="deal-btn" type="button" class="btn-kid btn-kid-primary">
            <span class="btn-kid-icon">🃏</span>
            <span class="btn-kid-text">Show Cards!</span>
            <span class="btn-kid-hint">See who wins</span>
          </button>
          <button id="new-round-btn" type="button" class="btn-kid btn-kid-primary" disabled>
            <span class="btn-kid-icon">🔄</span>
            <span class="btn-kid-text">Play Again!</span>
            <span class="btn-kid-hint">Next round</span>
          </button>
        </div>
      </section>
    </div>
  </div>

  <script src="js/shared.js"></script>
  <script src="js/avatars.js"></script>
  <script src="js/multiplayer.js"></script>
  <script src="js/controls-ui.js"></script>
  <script src="js/baccarat-client.js"></script>
</body>
</html>
