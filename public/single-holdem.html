<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texas Hold'em (Single Player) — Casino Royale</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="game-page">
  <header class="site-header">
    <a href="/" class="back-link">← Lobby</a>
    <h1>Texas Hold'em <span class="mode-badge">Single Player</span></h1>
    <div class="chip-display"><span class="chip-label">Balance</span><span class="chip-amount" id="balance">$10,000</span></div>
  </header>
  <div class="game-panel">
    <div class="table-felt holdem-table">
      <div class="pot-display">Pot: <span id="pot">$0</span> · <span id="round-info">Waiting</span></div>
      <div id="community-cards" class="card-row community-row"></div>
      <p id="message" class="game-message">Start a hand to play against AI opponents.</p>
      <div id="players-area" class="holdem-seats"></div>
    </div>
    <div class="controls-panel">
      <div class="action-controls holdem-actions">
        <button id="start-btn" class="btn btn-gold">Start Hand</button>
        <button id="fold-btn" class="btn btn-danger" disabled>Fold</button>
        <button id="check-btn" class="btn" disabled>Check</button>
        <button id="call-btn" class="btn" disabled>Call</button>
        <input type="number" id="raise-amount" value="100" min="50" step="25" disabled>
        <button id="raise-btn" class="btn btn-gold" disabled>Raise</button>
        <button id="allin-btn" class="btn" disabled>All In</button>
      </div>
    </div>
    <p class="mode-links"><a href="holdem.html">Play Multiplayer →</a></p>
  </div>
  <script src="js/shared.js"></script>
  <script src="js/deck.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/single-shared.js"></script>
  <script src="js/single-holdem.js"></script>
</body>
</html>
